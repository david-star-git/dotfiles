# =============================================================================
# ~/.config/tmux/plugins.conf — TPM plugin declarations
#
# Add plugins here, then install with <prefix>I.
# Remove a plugin by deleting its line, then run <prefix>Alt+u to clean up.
#
# Plugins are cloned into ~/.tmux/plugins/ by TPM.
# =============================================================================

# TPM — Tmux Plugin Manager (required, must be first)
set -g @plugin 'tmux-plugins/tpm'

# tmux-sensible — a set of sensible default tmux options that most people agree on.
# Sets things like: utf-8, larger history, faster key repetition, focus events.
set -g @plugin 'tmux-plugins/tmux-sensible'

# catppuccin-tmux — Catppuccin Mocha theme for the status bar.
# Configured in theme.conf.
set -g @plugin 'omerxx/catppuccin-tmux'

# vim-tmux-navigator — seamless navigation between tmux panes and nvim splits.
# Keybindings defined in remap.conf.
set -g @plugin 'christoomey/vim-tmux-navigator'
