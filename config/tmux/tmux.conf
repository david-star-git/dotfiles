# =============================================================================
# ~/.config/tmux/tmux.conf — main tmux config
#
# Loads the other config files in order:
#   remap.conf   — all keybindings and prefix
#   plugins.conf — TPM plugin declarations
#   theme.conf   — Catppuccin Mocha visual theme
#
# After editing this file, reload with: <prefix>r
# After editing plugins.conf, install new plugins with: <prefix>I
# =============================================================================

source-file ~/.config/tmux/remap.conf
source-file ~/.config/tmux/plugins.conf
source-file ~/.config/tmux/theme.conf

# ── Windows and panes ─────────────────────────────────────────────────────────
# Start window and pane numbering at 1 instead of 0 — easier to reach on keyboard.
set -g base-index 1

# When a window is closed, automatically renumber remaining windows so there
# are no gaps in the numbering.
set -g renumber-windows on

# Don't destroy the session when the last window is closed — detach instead.
# Prevents accidental session loss.
set -g detach-on-destroy off

# ── Input ─────────────────────────────────────────────────────────────────────
# Remove the delay after pressing Escape. Without this, vim and neomutt feel
# sluggish because tmux waits to see if Escape is the start of an escape sequence.
set -g escape-time 0

# Enable mouse support — click to select panes/windows, scroll to scroll.
set -g mouse on

# ── Status bar ────────────────────────────────────────────────────────────────
# Move the status bar to the top of the terminal.
set-option -g status-position top

# ── Plugin manager ────────────────────────────────────────────────────────────
# TPM (Tmux Plugin Manager) must be the last line.
# Install plugins:  <prefix>I
# Update plugins:   <prefix>U
# Remove unused:    <prefix>Alt+u
run '~/.tmux/plugins/tpm/tpm'
