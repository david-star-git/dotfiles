# =============================================================================
# ~/.config/tmux/theme.conf — Catppuccin Mocha status bar theme
#
# Uses the omerxx/catppuccin-tmux plugin (declared in plugins.conf).
# Full option reference: https://github.com/omerxx/catppuccin-tmux
# =============================================================================

# ── Flavor ────────────────────────────────────────────────────────────────────
# Catppuccin comes in four flavors: latte, frappe, macchiato, mocha.
# Mocha is the darkest — matches the rest of the Catppuccin Mocha setup.
set -g @catppuccin_flavor 'mocha'

# ── Terminal colors ───────────────────────────────────────────────────────────
# Pass the current $TERM through to the inner terminal so programs inside tmux
# get true color support. The override line enables 24-bit color (Tc) for the
# same terminal type.
set -g default-terminal "$TERM"
set -ag terminal-overrides ",$TERM:Tc"

# ── Status bar background ─────────────────────────────────────────────────────
# "default" means the status bar uses the terminal's background color rather
# than a solid Catppuccin color — makes it blend with transparent terminals.
set -g @catppuccin_status_background "default"

# ── Window tab style ──────────────────────────────────────────────────────────
# Block-style separators give a powerline aesthetic.
set -g @catppuccin_window_left_separator "█"
set -g @catppuccin_window_right_separator " "
set -g @catppuccin_window_middle_separator ""

set -g @catppuccin_window_current_right_separator ""

# Show the window number on the left side of the tab.
set -g @catppuccin_window_number_position "left"

# Inactive windows: show number filled + window name.
set -g @catppuccin_window_default_fill "number"
set -g @catppuccin_window_default_text "#W"

# Active window: same style but append a zoom indicator when the pane is zoomed.
set -g @catppuccin_window_current_fill "number"
set -g @catppuccin_window_current_text "#W#{?window_zoomed_flag,(),}"

# ── Status modules ────────────────────────────────────────────────────────────
# Right side — disabled (set to "none"). Uncomment the line below to re-enable
# the directory path and date/time on the right.
# set -g @catppuccin_status_modules_right "directory date_time"
set -g @catppuccin_status_modules_right "none"
set -g @catppuccin_date_time_text "%d.%m.%Y %H:%M"

# Left side — show the current session name.
set -g @catppuccin_status_modules_left "session"
set -g @catppuccin_status_left_separator  " █"
set -g @catppuccin_status_right_separator " "
set -g @catppuccin_status_right_separator_inverse "no"

# "icon" fill means only the icon portion of the module gets the accent color.
set -g @catppuccin_status_fill "icon"

# Don't draw a connecting separator between adjacent status modules.
set -g @catppuccin_status_connect_separator "no"

# Text shown in the directory module (if re-enabled on the right).
set -g @catppuccin_directory_text "#{pane_current_path}"
