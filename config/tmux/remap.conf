# =============================================================================
# ~/.config/tmux/remap.conf — keybindings
#
# Prefix: Ctrl+a  (more ergonomic than the default Ctrl+b)
#
# Navigation follows the same layout as nvim and i3:
#   j = left   k = up   l = down   ö = right
# =============================================================================

# ── Prefix ────────────────────────────────────────────────────────────────────
# Change prefix from Ctrl+b to Ctrl+a — easier to reach, matches screen convention.
set -g prefix ^a

# ── Config reload ─────────────────────────────────────────────────────────────
# Reload all config files without restarting tmux.
bind r source-file ~/.config/tmux/tmux.conf

# ── Pane splitting ────────────────────────────────────────────────────────────
# Remove the default split bindings (" and %) — they're awkward to type.
unbind '"'
unbind %
unbind x

# h = horizontal split (new pane below)
# v = vertical split   (new pane to the right)
bind h split-window -h
bind v split-window -v

# Kill the current pane without confirmation.
bind q kill-pane

# ── Pane navigation ───────────────────────────────────────────────────────────
# Move between panes using j/k/l/ö (matching nvim movement remaps).
bind-key j select-pane -L
bind-key k select-pane -U
bind-key l select-pane -D
bind-key ö select-pane -R

# ── Popups ────────────────────────────────────────────────────────────────────
# Popups are floating terminals that appear over the current pane and close
# when the program exits. -d sets the working directory to the current pane's path.

# lazygit — 80%×80% popup, opens in the current project directory.
bind g display-popup \
    -w 80% \
    -h 80% \
    -d "#{pane_current_path}" \
    -E "lazygit"

# Quick terminal — small popup shell for one-off commands.
bind Enter display-popup \
    -d "#{pane_current_path}" \
    -E "zsh"

# ranger — 90%×90% popup file manager.
bind e display-popup \
    -d "#{pane_current_path}" \
    -w 90% \
    -h 90% \
    -E "ranger"

# Mail sync — background window that runs mbsync + mailsort.
# Opens detached (-d) so focus stays on the current window.
# Closes automatically on success; stays open on error so you can read it.
bind m new-window -d -n 'mail-sync' \
    'mbsync -a && bash ~/.scripts/mailsort.sh || { echo; echo "── error, press any key ──"; read -k1; }'

# ── vim-tmux-navigator ────────────────────────────────────────────────────────
# Seamless navigation between tmux panes and nvim splits using Alt+j/k/l/ö.
# When the active pane is running nvim, the key is forwarded to nvim instead
# of switching panes — so the same keys work identically inside and outside nvim.
# Plugin: christoomey/vim-tmux-navigator

vim_pattern='(\S+/)?g?\.?(view|l?n?vim?x?|fzf)(diff)?(-wrapped)?'
is_vim="ps -o state= -o comm= -t '#{pane_tty}' \
    | grep -iqE '^[^TXZ ]+ +${vim_pattern}$'"

# Alt+j/k/l/ö — navigate panes/splits (no prefix required)
bind-key -n 'M-j' if-shell "$is_vim" 'send-keys C-h'  'select-pane -L'
bind-key -n 'M-l' if-shell "$is_vim" 'send-keys C-j'  'select-pane -D'
bind-key -n 'M-k' if-shell "$is_vim" 'send-keys C-k'  'select-pane -U'
bind-key -n 'M-ö' if-shell "$is_vim" 'send-keys C-l'  'select-pane -R'

# Handle Ctrl+\ for jumping to the last pane, with version-specific escaping.
tmux_version='$(tmux -V | sed -En "s/^tmux ([0-9]+(.[0-9]+)?).*/\1/p")'
if-shell -b '[ "$(echo "$tmux_version < 3.0" | bc)" = 1 ]' \
    "bind-key -n 'C-\\' if-shell \"$is_vim\" 'send-keys C-\\'  'select-pane -l'"
if-shell -b '[ "$(echo "$tmux_version >= 3.0" | bc)" = 1 ]' \
    "bind-key -n 'C-\\' if-shell \"$is_vim\" 'send-keys C-\\\\'  'select-pane -l'"

# Also bind the navigator keys in copy mode so they work while scrolling.
bind-key -T copy-mode-vi 'M-j' select-pane -L
bind-key -T copy-mode-vi 'M-l' select-pane -D
bind-key -T copy-mode-vi 'M-k' select-pane -U
bind-key -T copy-mode-vi 'M-ö' select-pane -R
