# =============================================================================
# theme.conf — visual identity
#
# Palette: Catppuccin Mocha + crimson accent (#C0415A) from catmocha.kvconfig.
# All $col_* variables are available in hyprland.conf and windowrules.conf.
# =============================================================================

# ── Catppuccin Mocha palette ─────────────────────────────────────────────────
$col_base      = rgb(1E1E2E)   # window background
$col_mantle    = rgb(181825)   # deeper background
$col_crust     = rgb(11111B)   # deepest background
$col_surface0  = rgb(313244)   # button / inactive element
$col_surface1  = rgb(45475A)   # inactive border, separators
$col_surface2  = rgb(585B70)   # disabled text, muted UI
$col_overlay0  = rgb(6C7086)   # placeholder text
$col_text      = rgb(CDD6F4)   # primary text
$col_subtext0  = rgb(A6ADC8)   # secondary text
$col_lavender  = rgb(B4BEFE)   # accent (links, visited)
$col_blue      = rgb(89B4FA)   # info, links visited
$col_sapphire  = rgb(74C7EC)   # sky
$col_teal      = rgb(94E2D5)   # teal accent
$col_green     = rgb(A6E3A1)   # success
$col_yellow    = rgb(F9E2AF)   # warning
$col_peach     = rgb(FAB387)   # orange/peach
$col_red       = rgb(F38BA8)   # error/destructive
$col_crimson   = rgb(C0415A)   # active border — from catmocha.kvconfig highlight

# ── Cursor, GTK, QT6 ──────────────────────────────────────────────────────────
env = WLR_NO_HARDWARE_CURSORS,1
env = XCURSOR_SIZE,24

env = GTK_THEME,Papirus-Dark
env = XCURSOR_THEME,Sweet-cursor

env = QT_QPA_PLATFORMTHEME,qt6ct
# env = HYPRCURSOR_SIZE,24

# ── Decoration ────────────────────────────────────────────────────────────────
decoration {
    # Rounded corners on every window
    rounding = 12

    # Active/inactive opacity — slight transparency on inactive windows
    active_opacity   = 1.0
    inactive_opacity = 0.92
    fullscreen_opacity = 1.0

    # Drop shadows
    shadow {
        enabled      = true
        range        = 20
        render_power = 3
        color        = rgba(11111Bee)   # crust with alpha
        offset       = 0 4
    }

    # Background blur (works on kitty, rofi, etc. with blur = true)
    blur {
        enabled       = true
        size          = 6
        passes        = 3
        noise         = 0.02
        contrast      = 0.9
        brightness    = 0.8
        vibrancy      = 0.2
        new_optimizations = true
        xray          = false
    }
}

# ── Animations ────────────────────────────────────────────────────────────────
# Bezier curves are named and reused in animation = lines below.
animations {
    enabled = true

    # ── Curves ──────────────────────────────────────────────────────────────
    # easeOutQuint — fast start, smooth deceleration (windows opening/closing)
    bezier = easeOutQuint, 0.23, 1, 0.32, 1
    # easeInOutCubic — symmetric ease (workspace switches)
    bezier = easeInOutCubic, 0.65, 0.05, 0.35, 0.95
    # easeOutBack — slight overshoot on open (lively feel)
    bezier = easeOutBack, 0.34, 1.56, 0.64, 1
    # linear — constant speed (border / fade tweaks)
    bezier = linear, 0, 0, 1, 1

    # ── Window animations ───────────────────────────────────────────────────
    animation = windowsIn,   1, 5,  easeOutBack,    popin 80%
    animation = windowsOut,  1, 4,  easeOutQuint,   popin 80%
    animation = windowsMove, 1, 4,  easeOutQuint

    # ── Workspace transitions ───────────────────────────────────────────────
    animation = workspaces,  1, 5,  easeInOutCubic, slidevert

    # ── Fade ────────────────────────────────────────────────────────────────
    animation = fadeIn,      1, 4,  easeOutQuint
    animation = fadeOut,     1, 3,  easeOutQuint
    animation = fadeLayers,  1, 4,  linear          # rofi, mako, etc.

    # ── Border color lerp ───────────────────────────────────────────────────
    animation = border,      1, 8,  linear
    animation = borderangle, 1, 8,  linear,         loop  # enables gradient rotation if used
}

# ── Dwindle layout ────────────────────────────────────────────────────────────
# Matches i3's default tiling behaviour.
dwindle {
    pseudotile         = false   # toggle with $mod+p if desired
    preserve_split     = true    # split direction remembered per-node
    smart_split        = false
    force_split        = 2       # always split to the right / bottom
}

# ── Master layout (optional, not default) ─────────────────────────────────────
master {
    new_status  = slave
    mfact       = 0.55
}
