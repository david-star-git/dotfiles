# =============================================================================
# autostart.conf — programs launched at Hyprland startup
#
# exec-once = runs exactly once per session (daemons, bars, agents)
# exec      = runs every time the config is reloaded (use sparingly)
#
# Wallpaper is restored by the wallpaper script reading ~/.cache/hypr/wallpaper.
# =============================================================================

# ── Portals & authentication ──────────────────────────────────────────────────
# XDG desktop portal for Hyprland (screen sharing, file pickers)
exec-once = /usr/lib/xdg-desktop-portal-hyprland &
exec-once = /usr/lib/xdg-desktop-portal &

# Polkit agent — prompts for elevated privileges in GUI apps
exec-once = /usr/lib/polkit-kde-authentication-agent-1 &

# ── Notifications ─────────────────────────────────────────────────────────────
exec-once = mako &

# ── Wallpaper — restore last set wallpaper on login ───────────────────────────
# The script writes the chosen path to ~/.cache/hypr/wallpaper.
# On startup it reads that file and passes it to hyprpaper / awww.
exec-once = awww-daemon
exec-once = ~/.config/rofi/scripts/wallpaper.sh --restore

# ── Audio ─────────────────────────────────────────────────────────────────────
exec-once = pipewire &
exec-once = pipewire-pulse &
exec-once = wireplumber &

# ── Clipboard manager ─────────────────────────────────────────────────────────
# cliphist stores clipboard history; wl-paste feeds it entries.
exec-once = wl-paste --type text  --watch cliphist store &
exec-once = wl-paste --type image --watch cliphist store &

# ── Cursor ────────────────────────────────────────────────────────────────────
exec-once = hyprctl setcursor Catppuccin-Mocha-Dark 24

# ── ASUS hardware daemons (from i3 config) ────────────────────────────────────
exec-once = asus_fan_listener &
exec-once = battery_listener &

# ── Music daemon ──────────────────────────────────────────────────────────────
exec-once = mpd &

# ── eww bar (uncomment once your eww config is in place) ─────────────────────
# exec-once = eww daemon && eww open bar
