# =============================================================================
# hyprland.conf — main entry point
#
# This file only sets monitor/input/misc globals and sources the sub-configs.
# Everything else lives in its own file:
#
#   theme.conf      — colors, borders, gaps, blur, shadows, animations
#   keybinds.conf    — all bind = lines
#   windowrules.conf — windowrulev2 / layerrule / workspace rules
#   autostart.conf   — exec-once / exec lines
# =============================================================================

# ── Monitor ──────────────────────────────────────────────────────────────────
# Adjust resolution/position/scale to your hardware.
# "preferred" lets Hyprland pick the best mode automatically.
monitor = , preferred, auto, 1
monitor=DP-2,1920x1080@165,0x0,1
monitor=DP-1,1920x1080@165,1920x0,1

# ── Input ─────────────────────────────────────────────────────────────────────
input {
    kb_layout  = de
    follow_mouse = 1
    sensitivity  = -0.4          # -1.0 – 1.0; 0 means no modification

    touchpad {
        natural_scroll   = true
        disable_while_typing = true
        tap-to-click     = true
    }
}

# ── General layout ────────────────────────────────────────────────────────────
general {
    # Gaps match the i3 setup (inner 8, outer 0)
    gaps_in  = 3
    gaps_out = 3, 6, 6, 6

    # Border width in pixels
    border_size = 2

    # Colors are defined in theme.conf via $col_* variables;
    # re-declared here so general{} can reference them.
    col.active_border   = rgb(C0415A)
    col.inactive_border = rgb(45475A)

    layout = dwindle
    resize_on_border = true
}

# ── Misc ──────────────────────────────────────────────────────────────────────
misc {
    force_default_wallpaper = 0      # no Hyprland anime wallpaper
    disable_hyprland_logo   = true
    animate_manual_resizes  = true
    animate_mouse_windowdragging = true
    vfr = true                       # variable frame rate — saves power
}

# ── Sub-configs ───────────────────────────────────────────────────────────────
source = ~/.config/hypr/theme.conf
source = ~/.config/hypr/keybinds.conf
source = ~/.config/hypr/windowrules.conf
source = ~/.config/hypr/autostart.conf
