# =============================================================================
# keybinds.conf — all key bindings
#
# Translated from i3 config with Hyprland equivalents.
# $mod = SUPER (same as Mod4 in i3).
#
# Syntax:
#   bind  = MODS, key, dispatcher, [args]   — fires on key press
#   bindl = ...                             — fires even when screen locked
#   binde = ...                             — fires repeatedly while held
#   bindm = MODS, key, mouse_action         — mouse bindings
# =============================================================================

$mod = SUPER

# ── Applications ─────────────────────────────────────────────────────────────
bind = $mod,       Return, exec, kitty
bind = $mod,       b,      exec, librewolf
bind = $mod,       e,      exec, dolphin

# App launcher (rofi drun — replaces i3's rofi -show drun)
bind = $mod,       d,      exec, rofi -show drun -no-default-config -config ~/.config/rofi/launcher.rasi

# Wallpaper switcher (rofi, see scripts/wallpaper.sh)
bind = $mod,       w,      exec, ~/.config/rofi/scripts/wallpaper.sh

# Screen lock
bind = $mod,       l,      exec, hyprlock

# ── Window management ─────────────────────────────────────────────────────────
bind = $mod,       q,      killactive

# Fullscreen
bind = $mod,       f,      fullscreen, 0

# Toggle floating
bind = $mod SHIFT, space,  togglefloating

# Cycle focus between tiling and floating (mirrors i3's $mod+space)
bind = $mod,       space,  cyclenext

# ── Focus — arrow keys + HJKL (adapted from i3's jkl+ö layout) ──────────────
bind = $mod, left,  movefocus, l
bind = $mod, right, movefocus, r
bind = $mod, up,    movefocus, u
bind = $mod, down,  movefocus, d

bind = $mod, j, movefocus, l
bind = $mod, l, movefocus, d
bind = $mod, k, movefocus, u
bind = $mod, odiaeresis, movefocus, r

# ── Move windows ─────────────────────────────────────────────────────────────
bind = $mod SHIFT, left,       movewindow, l
bind = $mod SHIFT, right,      movewindow, r
bind = $mod SHIFT, up,         movewindow, u
bind = $mod SHIFT, down,       movewindow, d

bind = $mod SHIFT, j,          movewindow, l
bind = $mod SHIFT, l,          movewindow, d
bind = $mod SHIFT, k,          movewindow, u
bind = $mod SHIFT, odiaeresis, movewindow, r

# ── Split direction (mirrors i3's $mod+h / $mod+v) ───────────────────────────
# In dwindle, togglesplit flips the split direction for the focused node.
bind = $mod, v, togglesplit

# ── Workspaces ───────────────────────────────────────────────────────────────
bind = $mod, 1, workspace, 1
bind = $mod, 2, workspace, 2
bind = $mod, 3, workspace, 3
bind = $mod, 4, workspace, 4
bind = $mod, 5, workspace, 5
bind = $mod, 6, workspace, 6
bind = $mod, 7, workspace, 7
bind = $mod, 8, workspace, 8
bind = $mod, 9, workspace, 9
bind = $mod, 0, workspace, 10

bind = $mod SHIFT, 1, movetoworkspace, 1
bind = $mod SHIFT, 2, movetoworkspace, 2
bind = $mod SHIFT, 3, movetoworkspace, 3
bind = $mod SHIFT, 4, movetoworkspace, 4
bind = $mod SHIFT, 5, movetoworkspace, 5
bind = $mod SHIFT, 6, movetoworkspace, 6
bind = $mod SHIFT, 7, movetoworkspace, 7
bind = $mod SHIFT, 8, movetoworkspace, 8
bind = $mod SHIFT, 9, movetoworkspace, 9
bind = $mod SHIFT, 0, movetoworkspace, 10

# Scroll through workspaces with mouse wheel on desktop
bind = $mod, mouse_down, workspace, e+1
bind = $mod, mouse_up,   workspace, e-1

# ── Resize mode ──────────────────────────────────────────────────────────────
# Mirrors i3's resize mode. Hold $mod+r, then use arrow keys / HJKL.
bind = $mod, r, submap, resize

submap = resize
    binde = , right,     resizeactive,  20  0
    binde = , left,      resizeactive, -20  0
    binde = , up,        resizeactive,  0 -20
    binde = , down,      resizeactive,  0  20

    binde = , l,         resizeactive,  20  0
    binde = , h,         resizeactive, -20  0
    binde = , k,         resizeactive,  0 -20
    binde = , j,         resizeactive,  0  20

    bind  = , Return,    submap, reset
    bind  = , Escape,    submap, reset
    bind  = $mod, r,     submap, reset
submap = reset

# ── Mouse window actions ──────────────────────────────────────────────────────
# LMB drag to move, RMB drag to resize (mirrors i3's floating_modifier)
bindm = $mod, mouse:272, movewindow
bindm = $mod, mouse:273, resizewindow

# ── Media keys ───────────────────────────────────────────────────────────────
# bindl so they work on the lock screen too
bindl = , XF86AudioRaiseVolume, exec, volume_control -s +5 -m 125 && volume_level
bindl = , XF86AudioLowerVolume, exec, volume_control -s -5 -m 125 && volume_level
bindl = , XF86AudioMute,        exec, pactl set-sink-mute @DEFAULT_SINK@   toggle && volume_mute
bindl = , XF86AudioMicMute,     exec, pactl set-source-mute @DEFAULT_SOURCE@ toggle && microphone_mute

# Brightness — uses brightnessctl (installed in eww stack)
binde = , XF86MonBrightnessUp,   exec, brightness_control -s +2 && brightness_level
binde = , XF86MonBrightnessDown, exec, brightness_control -s -2 && brightness_level

# Fan toggle (ASUS-specific)
bind  = CTRL, F5, exec, asus_fan_toggle

# Touchpad toggle
bind  = , XF86TouchpadToggle, exec, touchpad_toggle

# Screen off
bind  = , XF86ScreenSaver, exec, hyprctl dispatch dpms off

# ── Screenshots ───────────────────────────────────────────────────────────────
# Mirrors i3: Pause = selection, Print = fullscreen
bind = , Pause, exec, screenshot -sa    # area/selection
bind = , Print, exec, screenshot -sf    # full screen

# ── Hyprland meta ─────────────────────────────────────────────────────────────
# Reload config (mirrors i3's $mod+Shift+r)
bind = $mod SHIFT, r, exec, hyprctl reload

# Exit Hyprland
bind = $mod SHIFT, q, exit
