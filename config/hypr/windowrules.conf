# =============================================================================
# windowrules.conf — per-application window rules
#
# Syntax: windowrule = rule, matcher
# Common matchers: class:^(regex)$   title:^(regex)$   floating:1
#
# Rules are evaluated top-to-bottom; first match wins for most properties.
# =============================================================================

# ── Floating windows ─────────────────────────────────────────────────────────
# Calculator — small centered float (matches i3 comments)
windowrule = float [on], match:class Qalculate-gtk
windowrule = size 400 600, match:class Qalculate-gtk
windowrule = center [on], match:class Qalculate-gtk
windowrule = pin [on], match:class Qalculate-gtk

# Picture-in-Picture — all known browser variants
windowrule = float [on], match:title Picture-in-Picture
windowrule = pin [on], match:title Picture-in-Picture
windowrule = size 640 360, match:title Picture-in-Picture
windowrule = move 100%-650 50, match:title Picture-in-Picture

# File manager dialogs
windowrule = float [on], match:class xdg-desktop-portal
windowrule = float [on], match:class xdg-desktop-portal-gtk

# Polkit authentication agent
windowrule = float [on], match:class polkit-kde-authentication-agent-1
windowrule = center [on], match:class polkit-kde-authentication-agent-1

# Pavucontrol / volume mixer
windowrule = float [on], match:class pavucontrol
windowrule = size 700 500, match:class pavucontrol
windowrule = center [on], match:class pavucontrol

# ── Blur override for specific layers ────────────────────────────────────────
# rofi and mako get blur via layerrule (they are layer surfaces, not windows)
layerrule = blur [on],  match:namespace rofi
layerrule = blur [on],  match:namespace notifications   # mako

# ── Opacity overrides ─────────────────────────────────────────────────────────
# Terminal — allow full opacity; themes.conf sets 0.92 globally
windowrule = opacity 1.0 override 1.0 override, match:class kitty

# ── Workspace assignments (optional, commented — uncomment to use) ────────────
# windowrule = workspace 1, match:class librewolf
# windowrule = workspace 4, match:class kitty
# windowrule = workspace 4, match:class dolphin

# ── Screenshot ─────────────────────────────────────────────────────────────────
windowrule = match:title flameshot, float true
windowrule = match:title flameshot, move 0 0
windowrule = match:title flameshot, suppress_event fullscreen

# ── wlogout ─────────────────────────────────────────────────────────────────
layerrule = blur [on], match:namespace wlogout

layerrule = blur [on], match:namespace rofi
layerrule = ignore_alpha 0,match:namespace rofi


windowrule = float [on], match:class audio-popup
windowrule = size 450 250, match:class audio-popup
windowrule = move 100%-460 36, match:class audio-popup
windowrule = animation slide top, match:class audio-popup
