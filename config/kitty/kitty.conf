# =============================================================================
# ~/.config/kitty/kitty.conf
# Migrated from Alacritty — David
# =============================================================================

# ── Shell ─────────────────────────────────────────────────────────────────────
# Start tmux automatically, attaching to existing session if one exists.
shell /usr/bin/tmux new-session -A -s main

# ── Terminal identity ─────────────────────────────────────────────────────────
# kitty's native term value gives best feature support (true color, graphics).
# Your alacritty config forced xterm-256color — only change this back if some
# program misbehaves with xterm-kitty.
term xterm-kitty

# ── Window ────────────────────────────────────────────────────────────────────
window_padding_width 3
background_opacity  0.9

# Blur requires a compositor (e.g. picom/kawase or KWin on Plasma).
# Value is blur radius — 10 is a good starting point, adjust to taste.
background_blur     10

# Static title — kitty uses dynamic_title by default.
# Setting this to 'no' locks the title to the value below.
dynamic_title       no
title               kitty

# ── Font ──────────────────────────────────────────────────────────────────────
# Monolisa — same as your Alacritty config.
# If kitty can't find it, check: kitty +list-fonts | grep -i monolisa
font_family         Monolisa
font_size           10.0

# ── Mouse ─────────────────────────────────────────────────────────────────────
# Right click pastes from clipboard, matching your Alacritty binding.
mouse_map right press ungrabbed paste_from_clipboard

# ── Colors — Catppuccin Mocha ─────────────────────────────────────────────────
foreground              #cdd6f4
background              #1e1e2e
dim_foreground          #7f849c
selection_foreground    #1e1e2e
selection_background    #f5e0dc

# Cursor
cursor                  #f5e0dc
cursor_text_color       #1e1e2e

# Normal colors
color0  #45475a
color1  #f38ba8
color2  #a6e3a1
color3  #f9e2af
color4  #89b4fa
color5  #f5c2e7
color6  #94e2d5
color7  #bac2de

# Bright colors
color8  #585b70
color9  #f38ba8
color10 #a6e3a1
color11 #f9e2af
color12 #89b4fa
color13 #f5c2e7
color14 #94e2d5
color15 #a6adc8

# Indexed colors (from your alacritty [[colors.indexed_colors]])
color16 #fab387
color17 #f5e0dc

# URL underline color
url_color #89b4fa

# Search matches (maps from alacritty colors.search)
# kitty doesn't have a direct equivalent — these control mark highlights
mark1_foreground #1e1e2e
mark1_background #a6adc8
mark2_foreground #1e1e2e
mark2_background #a6e3a1

# ── Scrollback ────────────────────────────────────────────────────────────────
scrollback_lines 10000

# ── Bell ──────────────────────────────────────────────────────────────────────
enable_audio_bell no
