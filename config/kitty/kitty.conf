# =============================================================================
# ~/.config/kitty/kitty.conf
# Migrated from Alacritty. Catppuccin Mocha color scheme.
#
# Live reload: Ctrl+Shift+F5
# Inline images: kitty +kitten icat <file>
# =============================================================================

# ── Shell ─────────────────────────────────────────────────────────────────────
# Attach to an existing tmux session called "main" on launch, or create it if
# it doesn't exist yet. -A means attach-or-create.
shell /usr/bin/tmux new-session -A -s main

# ── Terminal identity ─────────────────────────────────────────────────────────
# xterm-kitty enables kitty-specific features: full keyboard protocol, graphics
# protocol (inline images), undercurl, etc. Only change to xterm-256color if
# a specific program misbehaves.
term xterm-kitty
linux_display_server x11

# ── Window ────────────────────────────────────────────────────────────────────
# Padding in pixels around the terminal content on each side.
window_padding_width 3

# Background transparency. 1.0 = fully opaque, 0.0 = fully transparent.
# Requires a compositor to actually render the transparency (KWin on Plasma
# handles this automatically — no extra setup needed).
background_opacity 0.4

# Blur radius applied to whatever is behind the window.
# Higher values = more blurred background. Requires compositor support.
background_blur 1

# Keep the title bar static — dynamic titles change based on the running
# program (e.g. nvim shows the filename). Set to "yes" to re-enable.
dynamic_title no
title kitty

# ── Font ──────────────────────────────────────────────────────────────────────
# MonoLisa — same as Alacritty config. Check available names with:
#   kitty +list-fonts | grep -i monolisa
font_family      MonoLisa Regular
bold_font        MonoLisa Bold
italic_font      MonoLisa Regular Italic
bold_italic_font MonoLisa Bold Italic
font_size        11.0

# ── Mouse ─────────────────────────────────────────────────────────────────────
# Right-click pastes from clipboard, matching the Alacritty binding.
mouse_map right press ungrabbed paste_from_clipboard

# ── Scrollback ────────────────────────────────────────────────────────────────
scrollback_lines 10000

# ── Bell ──────────────────────────────────────────────────────────────────────
enable_audio_bell no

# =============================================================================
# Colors — Catppuccin Mocha
# https://github.com/catppuccin/kitty
# =============================================================================

# Base text and background
foreground #cdd6f4
background #1e1e2e

# Text shown when the terminal is dimmed (e.g. inactive window)
dim_foreground #7f849c

# Text and background of selected text regions
selection_foreground #1e1e2e
selection_background #f5e0dc

# ── Cursor ────────────────────────────────────────────────────────────────────
cursor            #f5e0dc
cursor_text_color #1e1e2e
cursor_shape beam

# ── URL underline ─────────────────────────────────────────────────────────────
url_color #89b4fa

# ── Mark highlights (Ctrl+Shift+H in kitty) ───────────────────────────────────
mark1_foreground #1e1e2e
mark1_background #a6adc8
mark2_foreground #1e1e2e
mark2_background #a6e3a1

# ── Normal 16 colors ─────────────────────────────────────────────────────────
# These map to the standard terminal color slots (color0–color15).
# Programs that use "bold red" or "bright green" etc. pull from these.

# Normal
color0  #45475a   # black   (surface1)
color1  #f38ba8   # red
color2  #a6e3a1   # green
color3  #f9e2af   # yellow
color4  #89b4fa   # blue
color5  #f5c2e7   # magenta (pink)
color6  #94e2d5   # cyan    (teal)
color7  #bac2de   # white   (subtext1)

# Bright
color8  #585b70   # bright black  (surface2)
color9  #f38ba8   # bright red    (same — intentional in Catppuccin)
color10 #a6e3a1   # bright green
color11 #f9e2af   # bright yellow
color12 #89b4fa   # bright blue
color13 #f5c2e7   # bright magenta
color14 #94e2d5   # bright cyan
color15 #a6adc8   # bright white  (subtext0)

# ── Extended indexed colors ───────────────────────────────────────────────────
# These match the [[colors.indexed_colors]] entries from Alacritty config.
color16 #fab387   # peach  (used by some prompts and syntax highlighters)
color17 #f5e0dc   # rosewater
